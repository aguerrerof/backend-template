version: '3.1'
services:
  db:
    image: postgres:15-alpine
    container_name: petpower-db
    environment:
      POSTGRES_DB: petpower
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  db_data: